services:
  - type: web
    name: fitai-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: fitai-data
      mountPath: /var/data
      sizeGB: 1
